# The Library — books that shaped how you think, with a line on why.
# These are starter picks inferred from your essays. Swap in your real shelf.

- title: Deep Work
  author: Cal Newport
  note: The case for attention as the scarcest professional resource.

- title: How to Take Smart Notes
  author: Sönke Ahrens
  note: Writing as thinking; notes as compound interest.

- title: The Creative Act
  author: Rick Rubin
  note: Permission to treat making things as a way of being.

- title: Range
  author: David Epstein
  note: Why generalists thrive — comfort for the multi-hyphenate.
