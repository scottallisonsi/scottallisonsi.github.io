# Site settings — edit these once, rarely again.
# Day-to-day content lives in _data/*.yml and _posts/.

title: Scott Allison Si
description: >-
  Product builder, writer, and educator based in Singapore.
  Essays, talks, and notes at a slower frame rate.
url: "https://scottallisonsi.github.io"
baseurl: ""
author:
  name: Scott Allison Si
  email: scottallisonsi@gmail.com

timezone: Asia/Singapore

permalink: /writing/:year/:title/

# Build settings
theme: null
markdown: kramdown
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

feed:
  path: feed.xml

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - vendor/
  - node_modules/
