---
layout: default
---
<article class="post">
  <header class="post-header">
    <p class="post-meta">
      <time datetime="{{ page.date | date_to_xmlschema }}">
        {{ page.date | date: "%-d %B %Y" }}
      </time>
    </p>
    <h1 class="post-title">{{ page.title }}</h1>
    {% if page.subtitle %}
      <p class="post-subtitle">{{ page.subtitle }}</p>
    {% endif %}
  </header>

  <div class="post-body">
    {{ content }}
  </div>

  <footer class="post-footer">
    <a class="back-link" href="{{ '/writing/' | relative_url }}">&laquo; All writing</a>
  </footer>
</article>
